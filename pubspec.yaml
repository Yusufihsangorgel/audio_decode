name: audio_decode
description: >-
  Decode MP3 and Ogg Vorbis to raw PCM in Dart, over FFI. Compiles stb_vorbis
  and minimp3 from source: self-contained, pure-Dart friendly, no platform
  plugins or prebuilt binaries.
version: 0.5.0
repository: https://github.com/Yusufihsangorgel/audio_decode
issue_tracker: https://github.com/Yusufihsangorgel/audio_decode/issues

topics:
  - audio
  - mp3
  - vorbis
  - pcm
  - ffi

screenshots:
  - description: >-
      Compressed bytes in, PCM samples out: the first bytes pick stb_vorbis or m
      inimp3, which yields interleaved 16-bit samples.
    path: doc/architecture.png
  - description: >-
      Decoding one Ogg file in process versus through ffmpeg: every ffmpeg bar
      starts with the same 24.8 ms of process startup.
    path: doc/benchmark.png

environment:
  sdk: ^3.9.0

dependencies:
  ffi: ^2.1.0
  hooks: '>=2.0.2 <3.0.0'
  code_assets: ^1.2.1
  native_toolchain_c: '>=0.19.2 <0.20.0'

dev_dependencies:
  test: ^1.25.0
  lints: ^6.0.0
