name: audio_decode
description: >-
  Decode MP3 and Ogg Vorbis to raw PCM in Dart, over FFI. Compiles stb_vorbis
  and minimp3 from source: self-contained, pure-Dart friendly, no platform
  plugins or prebuilt binaries.
version: 0.2.0
repository: https://github.com/Yusufihsangorgel/audio_decode
issue_tracker: https://github.com/Yusufihsangorgel/audio_decode/issues

topics:
  - audio
  - mp3
  - vorbis
  - pcm
  - ffi

environment:
  sdk: ^3.9.0

dependencies:
  ffi: ^2.1.0
  hooks: ^2.1.0
  code_assets: ^1.2.1
  native_toolchain_c: ^0.19.3

dev_dependencies:
  test: ^1.25.0
  lints: ^6.0.0
